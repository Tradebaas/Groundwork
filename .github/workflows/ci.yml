# Groundwork CI: the unbypassable authority. Local hooks are convenience; this is the gate.
# The `stack` skill extends this file with the stack's own gates when the stack is chosen.
name: ci

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Checks must prove themselves first
        run: |
          node checks/check.test.mjs
          node checks/progress.test.mjs

      - name: Groundwork checks
        run: node checks/check.mjs

      # --- Stack gates (added by the `stack` skill; keep the order: cheap → expensive) ---
      # - name: Typecheck (strict: the top catcher of AI slips)
      # - name: Lint & format
      # - name: Tests
      # - name: Dependency audit (fail on high/critical)
      # - name: Secret scan (gitleaks or equivalent)
      # - name: Build

  # The local commit-msg hook can be skipped (--no-verify, or a clone that never ran
  # --install-hooks), so the message gate is re-proven here, where it cannot be bypassed.
  trace:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Every commit message passes the gate
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          rc=0
          for sha in $(git rev-list "$BASE".."$HEAD"); do
            git log -1 --format=%B "$sha" > "$RUNNER_TEMP/msg"
            node checks/check.mjs --commit-msg "$RUNNER_TEMP/msg" || { echo "  ^ commit $sha"; rc=1; }
          done
          exit $rc

      # Nothing validates the PR body: squash is disabled on this repo (decision 0014), so these
      # commits reach main unchanged and their own trailers are the shipped artifact.
